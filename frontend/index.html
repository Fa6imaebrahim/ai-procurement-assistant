<!DOCTYPE html>
<html>
<head>
  <title>AI Procurement Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 700px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #1f2937;
    }

    .chat-box {
      border: 1px solid #ddd;
      height: 350px;
      overflow-y: auto;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      background: #fafafa;
      white-space: pre-line;
    }

    .user {
      color: #2563eb;
      font-weight: bold;
      margin-top: 10px;
    }

    .bot {
      color: #111827;
      margin-bottom: 10px;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .examples {
      font-size: 14px;
      color: #555;
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>AI Procurement Assistant</h1>

    <div class="chat-box" id="chatBox">
      <div class="bot">Assistant: Ask me about procurement spending, suppliers, orders, or items.</div>
    </div>

    <div class="input-area">
      <input id="questionInput" type="text" placeholder="Ask a procurement question..." />
      <button onclick="askQuestion()">Ask</button>
    </div>

    <div class="examples">
  Try:
  <br>• orders in 2013
  <br>• highest spending quarter
  <br>• most frequent item
  <br>• top 5 suppliers by spending
</div>
  </div>

  <script>
    async function askQuestion() {
      const input = document.getElementById("questionInput");
      const chatBox = document.getElementById("chatBox");
      const question = input.value.trim();

      if (!question) return;

      chatBox.innerHTML += `<div class="user">You: ${question}</div>`;
      chatBox.innerHTML += `<div class="bot">Assistant: Thinking...</div>`;

      input.value = "";

      try {
        const response = await fetch(`http://127.0.0.1:8000/ask?question=${encodeURIComponent(question)}`, {
          method: "POST"
        });

        const data = await response.json();

        const thinkingMessages = chatBox.querySelectorAll(".bot");
        thinkingMessages[thinkingMessages.length - 1].innerText = "Assistant: " + data.answer;

      } catch (error) {
        const thinkingMessages = chatBox.querySelectorAll(".bot");
        thinkingMessages[thinkingMessages.length - 1].innerText = "Assistant: Error connecting to backend.";
      }

      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
